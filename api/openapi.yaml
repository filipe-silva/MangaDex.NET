openapi: 3.0.3
info:
  contact:
    email: support@mangadex.org
    name: MangaDex staff team
  description: |
    MangaDex is an ad-free manga reader offering high-quality images!

    This document details our API as it is right now. It is in no way a promise to never change it, although we will endeavour to publicly notify any major change.

    # Acceptable use policy

    Usage of our services implies acceptance of the following:
    - You **MUST** credit us
    - You **MUST** credit scanlation groups if you offer the ability to read chapters
    - You **CANNOT** run ads or paid services on your website and/or apps

    These may change at any time for any and no reason and it is up to you check for updates from time to time.

    # Security issues

    If you believe you found a security issue in our API, please check our [security.txt](/security.txt) to get in touch privately.
  title: MangaDex API
  version: 5.10.0
servers:
- description: MangaDex Api
  url: https://api.mangadex.org
security:
- Bearer: []
tags:
- name: Account
- name: ApiClient
- name: AtHome
- name: Authentication
- name: Author
- name: Captcha
- name: Chapter
- name: Cover
- name: CustomList
- name: Feed
- name: Follows
- name: Forums
- name: Infrastructure
- name: Legacy
- name: Manga
- name: Rating
- name: ReadMarker
- name: Report
- name: ScanlationGroup
- name: Settings
- name: Statistics
- name: Upload
- name: User
paths:
  /ping:
    get:
      description: Returns a plaintext response containing only the word "pong" if
        the API is healthy
      operationId: get-ping
      responses:
        "200":
          content:
            text/plain:
              schema:
                default: pong
                type: string
          description: Pong
      security: []
      summary: Ping healthcheck
      tags:
      - Infrastructure
  /manga:
    get:
      description: Search a list of Manga.
      operationId: get-search-manga
      parameters:
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          maximum: 100
          minimum: 0
          pattern: ^\d+$
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          minimum: 0
          pattern: ^\d+$
          type: integer
        style: form
      - explode: true
        in: query
        name: title
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: authorOrArtist
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: "authors[]"
        required: false
        schema:
          items:
            format: uuid
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: "artists[]"
        required: false
        schema:
          items:
            format: uuid
            type: string
          type: array
        style: form
      - description: Year of release or none
        explode: true
        in: query
        name: year
        required: false
        schema:
          $ref: '#/components/schemas/get_search_manga_year_parameter'
        style: form
      - explode: true
        in: query
        name: "includedTags[]"
        required: false
        schema:
          items:
            format: uuid
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: includedTagsMode
        required: false
        schema:
          default: AND
          enum:
          - AND
          - OR
          type: string
        style: form
      - explode: true
        in: query
        name: "excludedTags[]"
        required: false
        schema:
          items:
            format: uuid
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: excludedTagsMode
        required: false
        schema:
          default: OR
          enum:
          - AND
          - OR
          type: string
        style: form
      - explode: true
        in: query
        name: "status[]"
        required: false
        schema:
          items:
            enum:
            - ongoing
            - completed
            - hiatus
            - cancelled
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: "originalLanguage[]"
        required: false
        schema:
          items:
            pattern: "^[a-zA-Z\\-]{2,5}$"
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: "excludedOriginalLanguage[]"
        required: false
        schema:
          items:
            pattern: "^[a-zA-Z\\-]{2,5}$"
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: "availableTranslatedLanguage[]"
        required: false
        schema:
          items:
            pattern: "^[a-zA-Z\\-]{2,5}$"
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: "publicationDemographic[]"
        required: false
        schema:
          items:
            enum:
            - shounen
            - shoujo
            - josei
            - seinen
            - none
            type: string
          type: array
        style: form
      - description: Manga ids (limited to 100 per request)
        explode: true
        in: query
        name: "ids[]"
        required: false
        schema:
          items:
            format: uuid
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: "contentRating[]"
        required: false
        schema:
          default:
          - safe
          - suggestive
          - erotica
          items:
            enum:
            - safe
            - suggestive
            - erotica
            - pornographic
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: createdAtSince
        required: false
        schema:
          description: "DateTime string with following format: YYYY-MM-DDTHH:MM:SS\
            \ in timezone UTC+0"
          pattern: "^\\d{4}-[0-1]\\d-([0-2]\\d|3[0-1])T([0-1]\\d|2[0-3]):[0-5]\\d:[0-5]\\\
            d$"
          type: string
        style: form
      - explode: true
        in: query
        name: updatedAtSince
        required: false
        schema:
          description: "DateTime string with following format: YYYY-MM-DDTHH:MM:SS\
            \ in timezone UTC+0"
          pattern: "^\\d{4}-[0-1]\\d-([0-2]\\d|3[0-1])T([0-1]\\d|2[0-3]):[0-5]\\d:[0-5]\\\
            d$"
          type: string
        style: form
      - explode: false
        in: query
        name: order
        required: false
        schema:
          $ref: '#/components/schemas/get_search_manga_order_parameter'
        style: deepObject
      - explode: true
        in: query
        name: "includes[]"
        required: false
        schema:
          $ref: '#/components/schemas/ReferenceExpansionManga'
        style: form
      - explode: true
        in: query
        name: hasAvailableChapters
        required: false
        schema:
          enum:
          - "0"
          - "1"
          - "true"
          - "false"
          type: string
        style: form
      - explode: true
        in: query
        name: group
        required: false
        schema:
          format: uuid
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MangaList'
          description: Manga list
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request
      security: []
      summary: Manga list
      tags:
      - Manga
    post:
      description: Create a new Manga.
      operationId: post-manga
      parameters:
      - explode: false
        in: header
        name: Content-Type
        required: true
        schema:
          default: application/json
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MangaCreate'
        description: The size of the body is limited to 64KB.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MangaResponse'
          description: Manga Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
      summary: Create Manga
      tags:
      - Manga
  /manga/{id}/aggregate:
    get:
      operationId: get-manga-aggregate
      parameters:
      - description: Manga ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - explode: true
        in: query
        name: "translatedLanguage[]"
        required: false
        schema:
          items:
            pattern: "^[a-zA-Z\\-]{2,5}$"
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: "groups[]"
        required: false
        schema:
          items:
            format: uuid
            maxLength: 36
            minLength: 36
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_manga_aggregate_200_response'
          description: OK
      security: []
      summary: Get Manga volumes & chapters
      tags:
      - Manga
  /manga/{id}:
    delete:
      operationId: delete-manga-id
      parameters:
      - description: Manga ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
          description: Manga has been deleted.
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
      summary: Delete Manga
      tags:
      - Manga
    get:
      description: Get Manga.
      operationId: get-manga-id
      parameters:
      - description: Manga ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - explode: true
        in: query
        name: "includes[]"
        required: false
        schema:
          $ref: '#/components/schemas/ReferenceExpansionManga'
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MangaResponse'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Manga no content
      security: []
      summary: Get Manga
      tags:
      - Manga
    put:
      operationId: put-manga-id
      parameters:
      - description: Manga ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - explode: false
        in: header
        name: Content-Type
        required: true
        schema:
          default: application/json
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/put_manga_id_request'
        description: The size of the body is limited to 64KB.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MangaResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
      summary: Update Manga
      tags:
      - Manga
  /auth/login:
    post:
      deprecated: true
      operationId: post-auth-login
      parameters:
      - explode: false
        in: header
        name: Content-Type
        required: true
        schema:
          default: application/json
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
        description: The size of the body is limited to 2KB.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
      security: []
      summary: Login
      tags:
      - Authentication
  /auth/check:
    get:
      description: |
        The returned list of permissions is computed depending on the generic role permissions that the token user has, their personal overrides, and the OpenID scopes of the token (we do not offer granular token permissions yet)
      operationId: get-auth-check
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckResponse'
          description: OK
      summary: Check the set of permissions associated with the current token
      tags:
      - Authentication
  /auth/logout:
    post:
      deprecated: true
      operationId: post-auth-logout
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
          description: OK
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Service Unavailable
      summary: Logout
      tags:
      - Authentication
  /auth/refresh:
    post:
      deprecated: true
      operationId: post-auth-refresh
      parameters:
      - explode: false
        in: header
        name: Content-Type
        required: true
        schema:
          default: application/json
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshToken'
        description: The size of the body is limited to 2KB.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
      security: []
      summary: Refresh token
      tags:
      - Authentication
  /account/available:
    get:
      deprecated: true
      operationId: get-account-available
      parameters:
      - description: Username to check for avaibility
        explode: true
        in: query
        name: username
        required: true
        schema:
          maxLength: 64
          minLength: 1
          pattern: "^[a-zA-Z0-9_-]+$"
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_account_available_200_response'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
      security: []
      summary: Account username available
      tags:
      - Account
  /account/create:
    post:
      deprecated: true
      operationId: post-account-create
      parameters:
      - explode: false
        in: header
        name: Content-Type
        required: true
        schema:
          default: application/json
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccount'
        description: The size of the body is limited to 4KB.
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request
      security: []
      summary: Create Account
      tags:
      - Account
  /account/activate/{code}:
    post:
      deprecated: true
      operationId: get-account-activate-code
      parameters:
      - explode: false
        in: path
        name: code
        required: true
        schema:
          pattern: "[0-9a-fA-F-]+"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountActivateResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
      security: []
      summary: Activate account
      tags:
      - Account
  /client:
    get:
      operationId: get-list-apiclients
      parameters:
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          maximum: 100
          minimum: 0
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          minimum: 0
          type: integer
        style: form
      - explode: true
        in: query
        name: state
        required: false
        schema:
          enum:
          - requested
          - approved
          - rejected
          - autoapproved
          type: string
        style: form
      - explode: true
        in: query
        name: name
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: "includes[]"
        required: false
        schema:
          $ref: '#/components/schemas/ReferenceExpansionApiClient'
        style: form
      - explode: false
        in: query
        name: order
        required: false
        schema:
          $ref: '#/components/schemas/get_list_apiclients_order_parameter'
        style: deepObject
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiClientList'
          description: OK
      summary: List own Api Clients
      tags:
      - ApiClient
    post:
      operationId: post-create-apiclient
      parameters:
      - explode: false
        in: header
        name: Content-Type
        required: true
        schema:
          default: application/json
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiClientCreate'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiClientResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
      summary: Create ApiClient
      tags:
      - ApiClient
  /client/{id}:
    delete:
      operationId: delete-apiclient
      parameters:
      - description: ApiClient ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - explode: true
        in: query
        name: version
        required: false
        schema:
          pattern: ^\d+$
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete_apiclient_200_response'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
      summary: Delete Api Client
      tags:
      - ApiClient
    get:
      operationId: get-apiclient
      parameters:
      - description: ApiClient ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - explode: true
        in: query
        name: "includes[]"
        required: false
        schema:
          $ref: '#/components/schemas/ReferenceExpansionApiClient'
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiClientResponse'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
      summary: Get Api Client by ID
      tags:
      - ApiClient
    post:
      operationId: post-edit-apiclient
      parameters:
      - description: ApiClient ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - explode: false
        in: header
        name: Content-Type
        required: true
        schema:
          default: application/json
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiClientEdit'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiClientResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
      summary: Edit ApiClient
      tags:
      - ApiClient
  /client/{id}/secret:
    get:
      operationId: get-apiclient-secret
      parameters:
      - description: ApiClient ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_apiclient_secret_200_response'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: "Client not found, not active or user is not the owner"
      summary: Get Secret for Client by ID
      tags:
      - ApiClient
    post:
      operationId: post-regenerate-apiclient-secret
      parameters:
      - description: ApiClient ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - explode: false
        in: header
        name: Content-Type
        required: true
        schema:
          default: application/json
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_apiclient_secret_200_response'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: "Client not found, not active or user is not the owner"
      summary: Regenerate Client Secret
      tags:
      - ApiClient
  /group:
    get:
      operationId: get-search-group
      parameters:
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          maximum: 100
          minimum: 0
