name: CI

# Build and test on every push to the main branches and on all pull requests.
# No packaging or publishing happens here — that's release.yml.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MangaDex.sln

      - name: Build
        run: dotnet build MangaDex.sln -c Release --no-restore

      - name: Test
        run: dotnet test MangaDex.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"
          if-no-files-found: ignore
