name: Release to NuGet

# Publishes the MangaDex package to nuget.org.
#
# Trigger by publishing a GitHub Release whose tag is the version (optionally "v"-prefixed), e.g. tag `v5.13.1` or `5.13.1.1`. 
# The tag becomes the package version, so the release and the published package always match. 
# You can also run it manually (workflow_dispatch) with an explicit version, 
# or leave the version blank to pack the <Version> from MangaDex.csproj as-is.
#
# Publishing uses nuget.org Trusted Publishing (OIDC) — no long-lived API key.
# nuget.org side: create a Trusted Publishing policy under your profile with
#   Repository Owner: filipe-silva
#   Repository: MangaDex.NET
#   Workflow File: release.yml
# Leave Environment blank unless you add `environment:` to the job below.
# GitHub side: the only secret needed is NUGET_USER = your nuget.org profile name (the account username, NOT your email).
# The job requests a short-lived key at run time.

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.2.3.X). Leave blank to use the .csproj <Version>."
        required: false

permissions:
  contents: read
  id-token: write   # required for Trusted Publishing: lets the job request a GitHub OIDC token

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            v="${GITHUB_REF_NAME#v}"          # strip an optional leading "v" from the tag
          else
            v="${{ github.event.inputs.version }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          # Reusable MSBuild arg, computed once and consumed by Build and Pack:
          # "-p:Version=<v>" when a version is set, empty otherwise (empty -> the
          # <Version> in MangaDex.csproj wins). Safe unquoted: a package version is digits/dots only.
          echo "ver_arg=${v:+-p:Version=$v}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${v:-<csproj default>}"

      - name: Restore
        run: dotnet restore MangaDex.sln

      - name: Build
        run: dotnet build MangaDex.sln -c Release --no-restore ${{ steps.ver.outputs.ver_arg }}

      - name: Test
        run: dotnet test MangaDex.sln -c Release --no-build

      - name: Pack
        run: dotnet pack src/MangaDex/MangaDex.csproj -c Release --no-build -o artifacts ${{ steps.ver.outputs.ver_arg }}

      # Exchange the GitHub OIDC token for a short-lived nuget.org API key.
      # Done right before push: the key is valid for only 1 hour.
      - name: NuGet login (OIDC → temporary API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
